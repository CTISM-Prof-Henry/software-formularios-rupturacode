<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Risco</title>
</head>
<body>
    <main>
        <h1>Detalhes do Risco: {{ risco.nome }}</h1>
        <p><strong>Descrição:</strong> {{ risco.descricao }}</p>
        <p><strong>Probabilidade:</strong> {{ risco.probabilidade }}</p>
        <p><strong>Impacto:</strong> {{ risco.impacto }}</p>
        <p><strong>Status:</strong> {{ risco.status }}</p>

        <nav aria-label="Ações para o risco">
            <a href="{% url 'editar_risco' risco.id %}">Editar Risco</a>
            {% if risco.status == 'Ativo' %}
                <a href="{% url 'desativar_risco' risco.id %}">Desativar Risco</a>
            {% endif %}
            <a href="{% url 'listar_riscos' %}">Voltar para a lista de riscos</a>
        </nav>
    </main>
</body>
</html>
