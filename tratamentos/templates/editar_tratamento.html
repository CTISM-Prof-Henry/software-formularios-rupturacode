{% extends "base.html" %}

{% block title %}Editar tratamento | Atlas{% endblock %}

{% block content %}
    <h1>Editar tratamento</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
    </form>

    <div class="actions">
        <a href="{% url 'listar_tratamentos' %}">Voltar para tratamentos</a>
    </div>
{% endblock %}
