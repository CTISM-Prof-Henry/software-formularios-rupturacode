{% extends "base.html" %}

{% block title %}Nova subunidade | Atlas{% endblock %}

{% block content %}
    <h1>Nova subunidade</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
    </form>

    <div class="actions">
        <a href="{% url 'listar_subunidades' %}">Voltar para subunidades</a>
    </div>
{% endblock %}
